<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元馨醫管家 - AI深度解析報告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #0B1120; color: #F8FAFC; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="w-full max-w-md bg-[#0B1120] min-h-screen relative overflow-x-hidden overflow-y-auto no-scrollbar pb-16">
        <div class="absolute top-0 left-0 w-full h-96 bg-blue-900/20 rounded-full blur-3xl -translate-y-1/2 pointer-events-none"></div>

        <div id="screen-auth-demo" class="block h-screen flex flex-col justify-center px-6 relative z-10">
            <div class="text-center mb-8">
                <p class="text-teal-400 text-sm font-semibold tracking-widest mb-2">YUANXIN HEALTHCARE</p>
                <h1 class="text-3xl font-bold text-white tracking-wide">AI 深度解析系統</h1>
            </div>
            <div class="glass-card rounded-3xl p-8 border-t border-white/10">
                <div class="absolute top-4 right-5 text-xs font-bold text-teal-300 border border-teal-300/30 px-2 py-1 rounded-md">DEMO體驗</div>
                <h2 class="text-2xl font-bold text-white mb-2 mt-4">身分安全驗證</h2>
                <div class="mb-5">
                    <label class="block text-slate-300 text-xs font-bold mb-2 tracking-wider">身分證字號</label>
                    <input class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-xl py-3 px-4 focus:outline-none focus:border-teal-400" type="text" placeholder="請輸入身分證字號 (Demo版免輸入)">
                </div>
                <button onclick="switchScreen('screen-dashboard')" class="w-full bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg mt-4">安全登入</button>
                <p class="text-center text-red-400 text-[10px] mt-3 font-bold tracking-tight">&lt;此報告為DEMO版請直接點選「安全登入」體驗&gt;</p>
            </div>
        </div>

        <div id="screen-dashboard" class="hidden px-5 pt-10 relative z-10">
            <div class="flex justify-between items-end mb-8 pl-2">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-wide">陳曉君 <span class="text-sm text-slate-400 font-normal">女士</span></h2>
                    <p class="text-xs text-teal-400 mt-1">深度解析完成 (2026/03)</p>
                </div>
                <div class="w-12 h-12 rounded-full border border-teal-400 flex items-center justify-center bg-teal-400/10">
                    <span class="text-xl font-bold text-teal-300">82</span>
                </div>
            </div>
            <div class="glass-card p-5 rounded-3xl mb-8"><canvas id="premiumLineChart"></canvas></div>
            <div class="glass-card rounded-2xl p-5 mb-8 border-l-4 border-l-teal-400">
                <h3 class="text-white font-bold text-base mb-2">專屬健康洞察</h3>
                <p class="text-slate-300 text-[13px]">系統觀察到您正處於代謝效率轉換期。您的 HDL-C 偏低與空腹血糖微幅上升，暗示著早期胰島素阻抗的萌芽。請放心，透過精準生活處方，我們能輕鬆逆轉此狀態。</p>
            </div>
            <div class="mt-8 mb-6 border-t border-slate-700 pt-8">
                <button onclick="switchScreen('screen-auth-real')" class="w-full border-2 border-red-500/80 text-red-400 font-bold py-3.5 px-4 rounded-xl flex justify-center items-center gap-2">
                    上傳您的真實健檢報告
                </button>
            </div>
            <div class="text-center pb-8"><button onclick="switchScreen('screen-auth-demo')" class="text-slate-500 text-xs font-bold underline">返回首頁</button></div>
        </div>

        <div id="screen-auth-real" class="hidden h-screen flex flex-col justify-center px-6 relative z-10">
            <div class="glass-card rounded-3xl p-8 border-t border-teal-500/30 shadow-lg">
                <h2 class="text-2xl font-bold text-white mb-2">身分安全驗證</h2>
                <div class="mb-5">
                    <label class="block text-slate-300 text-xs font-bold mb-2 tracking-wider">真實身分證字號</label>
                    <input id="realIdInput" class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl py-3 px-4 focus:outline-none focus:border-teal-400 uppercase" type="text" placeholder="例如：A123456789" maxlength="10">
                    <p id="idErrorMsg" class="text-red-400 text-xs mt-2 hidden">⚠️ 格式錯誤，請輸入大寫英文字母加9位數字</p>
                </div>
                <button onclick="validateRealId()" class="w-full bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold py-3.5 px-4 rounded-xl">安全登入</button>
            </div>
        </div>

        <div id="screen-upload" class="hidden px-5 pt-12 relative z-10 min-h-screen flex flex-col">
            <div class="glass-card rounded-2xl p-6 mb-8 border border-teal-500/30 flex-1 text-center flex flex-col justify-center items-center">
                <h3 class="text-white font-bold text-xl mb-2">身分驗證成功</h3>
                <p class="text-teal-400 font-bold mb-6" id="displayVerifiedId"></p>
                <p class="text-slate-300 text-sm mb-8 leading-relaxed bg-slate-800/80 p-4 rounded-xl text-left border border-slate-700">
                    為支援多頁圖檔及 PDF，我們採用 LINE 加密聊天室傳輸。請點擊下方按鈕回到聊天室直接上傳。
                </p>
                <button onclick="sendLineMessageAndClose()" class="w-full bg-[#06C755] text-white font-bold py-4 px-4 rounded-xl text-base shadow-lg transition-all flex items-center justify-center gap-2">
                    前往聊天室上傳報告
                </button>
            </div>
        </div>
    </div>

    <script>
        async function initializeLiff() {
            try { await liff.init({ liffId: "2009597152-9nSswjnk" }); } catch (err) { console.error("LIFF Error", err); }
        }
        initializeLiff();

        function switchScreen(targetId) {
            ['screen-auth-demo', 'screen-dashboard', 'screen-auth-real', 'screen-upload'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');
            if (targetId === 'screen-dashboard') { initPremiumLineChart(); }
            window.scrollTo(0, 0);
        }

        function validateRealId() {
            const idInput = document.getElementById('realIdInput').value.trim().toUpperCase();
            const idRegex = /^[A-Z][1-2]\d{8}$/;
            if (idRegex.test(idInput)) {
                document.getElementById('displayVerifiedId').innerText = "已綁定 ID: " + idInput;
                switchScreen('screen-upload'); 
            } else {
                document.getElementById('idErrorMsg').classList.remove('hidden');
            }
        }

        // 📲 重點修復：改用 Formspree 進行 UID 綁定通知
        async function sendLineMessageAndClose() {
            const idInput = document.getElementById('realIdInput').value.trim().toUpperCase();
            try {
                if (liff.isInClient()) {
                    const profile = await liff.getProfile();
                    
                    // 打包 JSON 資料發送至 Formspree
                    const data = {
                        "客戶LINE暱稱": profile.displayName,
                        "真實身分證字號": idInput,
                        "指定接收者_LINE_UID": profile.userId,
                        "_subject": "【客戶綁定通知】有客戶準備上傳健檢報告！"
                    };

                    // 使用你已經成功接收過信件的 Formspree ID
                    fetch('https://formspree.io/f/xeepqlok', {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    await liff.sendMessages([{
                        type: 'text',
                        text: `【建立專屬健康檔案】\n我的身分證字號：${idInput}\n\n(系統自動代發)\n👇 請在此對話框，開始上傳您的健檢報告！`
                    }]);
                    liff.closeWindow();
                }
            } catch (err) { alert('連線稍有延遲，請重試。'); }
        }

        function initPremiumLineChart() {
            const ctxLine = document.getElementById('premiumLineChart').getContext('2d');
            new Chart(ctxLine, {
                type: 'line',
                data: { labels: ['2024', '2025', '2026'], datasets: [{ label: '空腹血糖', data: [108, 102, 95], borderColor: '#2DD4BF', fill: false }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
